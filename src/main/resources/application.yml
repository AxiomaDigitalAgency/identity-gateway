server:
  port: 8083

spring:

  application:
    name: identity-gateway

  # -------------------------
  # R2DBC (runtime reactivo)
  # -------------------------
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:identity_db}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    pool:
      enabled: true
      initial-size: 5
      max-size: 20
      max-idle-time: 30m

  # -------------------------
  # JDBC
  # -------------------------
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:identity_db}
    username: root
    password: root
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5s

  # -------------------------
  # Flyway (migraciones vía JDBC)
  # -------------------------
  flyway:
    enabled: true
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:identity_db}
    user: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    locations: classpath:database/scripts
    baseline-on-migrate: true


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    redis:
      enabled: true
    r2dbc:
      enabled: true

logging:
  level:
    root: INFO
    com.axioma.aion.tenantservice: INFO
    org.springframework.r2dbc: INFO

app:
  security:
    session:
      ttl-seconds: 900
      blacklist-enabled: true
    session-jwt:
      issuer: identity-gateway
      secret-key: ${SESSION_JWT_SECRET:change-this-local-secret-key-with-at-least-32-chars}
      ttl-seconds: 900
    provider-routing:
      web: widget
      whatsapp: widget
      api: oauth